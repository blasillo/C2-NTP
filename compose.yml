version: '3'

services:
  ntp-servidor:
    build: ./server
    container_name: ntp-servidor
    ports:
      - "123:123/udp"
    command: ["python", "-u", "ntp-server.py"]  # <--- AQUÍ

  ntp-cliente:
    build: ./client
    container_name: ntp-cliente
    depends_on:
      - ntp-servidor
    command: ["python", "-u", "ntp-client.py", "ntp-servidor", "3"]