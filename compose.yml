version: '3'

services:
  ntp-servidor:
    build: ./server
    container_name: ntp-servidor
    ports:
      - "123:123/udp"
    command: ["python", "-u", "ntp-server.py"]  # <--- AQUÍ

  #ntp-cliente:
  #  build: ./client
  #  container_name: ntp-cliente
  #  depends_on:
  #    - ntp-servidor
  #  command: ["python", "-u", "ntp-client.py", "ntp-servidor", "3"]

  ntp-cliente-pwsh:
    build:
      context: ./client-pwsh
      dockerfile: Dockerfile
    container_name: ntp-cliente-pwsh
    depends_on:
      - ntp-servidor
    command: ["pwsh", "-NoProfile", "-NonInteractive", "-File", "ntp-client.ps1", "-Servidor", "ntp-servidor", "-Intervalo", "3"]